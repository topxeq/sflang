# Sflang Cargo workspace
#
# 包含两个成员：
#   - sflang: 语言核心库（lexer/parser/compiler/vm/builtins），可被其他 Rust 程序嵌入
#   - sf:     主程序（CLI + REPL），依赖 sflang 库

[workspace]
members = ["sflang", "sf"]
resolver = "2"

# workspace 级别的依赖统一管理
[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
authors = ["topxeq"]
license = "MIT"
repository = "https://github.com/topxeq/sflang"

# workspace 依赖（第三方库在此统一声明版本）
[workspace.dependencies]
# regex：rust-lang 官方正则库（MIT OR Apache-2.0），用于 reg* 内置函数。
# 选择官方 regex 而非 fancy-regex：线性时间保证（防 ReDoS）、官方维护、对标 Go regexp（Go 也不支持前后向断言）。
regex = "1"

# 编译优化配置：release 模式启用 LTO 与单代码生成单元，最大化优化
[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true
